# =====================================================================
#  PurpurEcoGovernor — Конфигурация
#  Все строки поддерживают синтаксис Kyori MiniMessage:
#  https://docs.advntr.dev/minimessage/format.html
# =====================================================================

# ---------------------------------------------------------------------
# Производительность и пороги
# ---------------------------------------------------------------------
performance:
  # Интервал семплирования (в тиках). 20 тиков = 1 секунда.
  sample-interval-ticks: 20

  # Размер скользящего окна (количество семплов для усреднения).
  rolling-window-size: 10

  # Порог MSPT (мс) для активации троттлинга мобов.
  mspt-throttle-threshold: 45.0

  # Порог MSPT (мс) для постепенного восстановления AI.
  mspt-restore-threshold: 35.0

  # Сколько мобов восстанавливать за один тик восстановления (плавность).
  restore-batch-size: 25

  # Период попыток восстановления AI (тики).
  restore-period-ticks: 40

# ---------------------------------------------------------------------
# Сканер плотности
# ---------------------------------------------------------------------
density:
  # Минимальное количество мобов в чанке для попадания в список кандидатов на троттлинг.
  min-mobs-per-chunk: 25

  # Максимум чанков, обрабатываемых за один проход.
  max-chunks-per-pass: 50

  # Максимум мобов, троттлящихся за один проход (для размазывания нагрузки).
  max-mobs-per-pass: 500

# ---------------------------------------------------------------------
# Трекер тайл-сущностей и предметов
# ---------------------------------------------------------------------
culling:
  # Порог количества тайл-сущностей в чанке для алерта.
  tile-entity-alert-threshold: 80

  # Порог количества Item-сущностей в чанке для алерта.
  ground-item-alert-threshold: 60

  # Период сканирования (тики).
  scan-period-ticks: 200

  # Лог-уровень алертов в консоль: NONE, INFO, WARN.
  log-level: WARN

# ---------------------------------------------------------------------
# Исключения (моб НЕ будет затронут троттлингом / удалением)
# ---------------------------------------------------------------------
exclusions:
  # Не троттлить мобов с кастомным именем (именные).
  skip-named: true
  # Не троттлить прирученных питомцев.
  skip-tamed: true
  # Не троттлить торговцев и жителей.
  skip-traders: true
  # Список EntityType, которые никогда не должны быть затронуты.
  type-blacklist:
    - VILLAGER
    - WANDERING_TRADER
    - IRON_GOLEM
    - SNOW_GOLEM
    - ARMOR_STAND
    - ENDER_DRAGON
    - WITHER

# ---------------------------------------------------------------------
# GUI
# ---------------------------------------------------------------------
gui:
  # Период обновления GUI (тики). 10 = 0.5 сек.
  refresh-period-ticks: 10
  # Заголовок GUI.
  title: "<gradient:#7B2FF7:#F107A3><b>⚙ PurpurEco — Панель мониторинга</b></gradient>"

# ---------------------------------------------------------------------
# Сообщения (MiniMessage, русский)
# ---------------------------------------------------------------------
messages:
  prefix: "<gradient:#7B2FF7:#F107A3><b>PurpurEco</b></gradient> <dark_gray>»</dark_gray> "
  reload-success: "<green>✔ Конфигурация успешно перезагружена."
  no-permission: "<red>✘ У вас недостаточно прав для выполнения этой команды."
  player-only: "<red>✘ Эта команда доступна только игрокам."
  throttle-activated: "<gold>⚠ Активирован троттлинг AI: <yellow><mobs></yellow> мобов заморожено в <yellow><chunks></yellow> чанках. MSPT: <red><mspt></red> мс."
  throttle-restored: "<green>✔ Восстановлен AI у <yellow><mobs></yellow> мобов. MSPT стабилизирован: <green><mspt></green> мс."
  density-alert: "<gold>⚠ <yellow>Высокая плотность</yellow> в чанке <aqua><world></aqua> <gray>[<x>, <z>]</gray> — мобов: <red><count></red>."
  tile-alert: "<gold>⚠ <yellow>Перегрузка тайл-сущностей</yellow>: <aqua><world></aqua> <gray>[<x>, <z>]</gray> — тайлов: <red><count></red>."
  item-alert: "<gold>⚠ <yellow>Свалка предметов</yellow>: <aqua><world></aqua> <gray>[<x>, <z>]</gray> — предметов: <red><count></red>."
  purge-result: "<green>✔ Удалено <yellow><count></yellow> предметов с земли."
  force-throttle-on: "<gold>⚙ Принудительный троттлинг <red>ВКЛЮЧЁН</red>."
  force-throttle-off: "<gold>⚙ Принудительный троттлинг <green>ВЫКЛЮЧЕН</green>."
  unknown-subcommand: "<red>✘ Неизвестная подкоманда. Используйте: <gray>/purpureco [reload|throttle|purge|gui]</gray>."
